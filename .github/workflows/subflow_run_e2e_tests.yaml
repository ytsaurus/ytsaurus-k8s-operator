name: "E2E Tests"

on:
  workflow_call:
    inputs:
      e2e_filter:
        type: string
        required: false
        default: ""
      DEBUG:
        type: string
        required: false
        default: ""
      TEST_YTSAURUS_VERSION:
        type: string
        required: false
        default: ""

  workflow_dispatch:
    inputs:
      e2e_filter:
        description: "E2E tests filter"
        type: string
        required: false
        default: ""
      DEBUG:
        description: "DEBUG"
        type: string
        required: false
        default: ""
      TEST_YTSAURUS_VERSION:
        description: "YTsaurus version or epoch"
        type: string
        required: false
        default: ""

env:
  DEBUG: "${{ inputs.DEBUG }}"
  TEST_YTSAURUS_VERSION: "${{ inputs.TEST_YTSAURUS_VERSION }}"

jobs:
  check:
    name: "Check ${{ matrix.e2e.name }} e2e tests"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        e2e:
          - name: "update basic"
            filter: "update && basic"
          - name: "update plan"
            filter: "update && plan"
          - name: "update other"
            filter: "update && !(basic || plan)"
          - name: "tls"
            filter: "tls"
          - name: "other"
            filter: "!(update || tls)"
          - name: "${{ inputs.e2e_filter }}"
            filter: "${{ inputs.e2e_filter }}"
            from_input: true
        exclude:
          - e2e:
              # run only from_input part when defined and vice versa
              from_input: ${{ ( ! inputs.e2e_filter ) && true || '' }}

    steps:
      # https://github.com/jlumbroso/free-disk-space
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      # https://github.com/actions/checkout
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # https://github.com/actions/setup-go
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      # https://github.com/Azure/setup-helm
      # https://github.com/helm/helm/releases
      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.6

      - name: Build YTsaurus operator
        shell: bash
        run: |
          make build

      - name: Setup k8s cluster
        shell: bash
        run: |
          make kind-create-cluster

      - name: Install YTsaurus operator
        shell: bash
        run: |
          make helm-kind-install
          kubectl get pod -A

      - name: Run ${{ matrix.e2e.name }} e2e tests
        env:
          GINKGO_LABEL_FILTER: ${{ matrix.e2e.filter }}
        shell: bash
        run: |
          make test-e2e

      - name: Make logs snapshot
        if: always()
        shell: bash
        run: |
          make logs-snapshot

      - name: Cleanup k8s cluster
        shell: bash
        run: |
          make helm-uninstall
          make kind-delete-cluster

      # https://github.com/dorny/test-reporter
      - name: Report results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: "E2E tests"
          path: "report.xml"
          reporter: java-junit

      # https://github.com/actions/upload-artifact
      - name: Upload logs snapshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "logs E2E tests ${{ matrix.e2e.name }}"
          path: "logs/"
          retention-days: 10
