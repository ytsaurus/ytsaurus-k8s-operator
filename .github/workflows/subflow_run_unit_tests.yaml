name: "Unit Tests"

on:
  workflow_call:
    inputs:
      DEBUG:
        type: string
        required: false
        default: ""

  workflow_dispatch:
    inputs:
      DEBUG:
        description: "DEBUG"
        type: string
        required: false
        default: ""

env:
  DEBUG: "${{ inputs.DEBUG }}"

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runs-on: ubuntu-latest
          - name: macos
            runs-on: macos-latest

    name: Run checks on ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}

    steps:
      # https://github.com/actions/checkout
      - name: checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # https://github.com/actions/setup-go
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run unit tests
        shell: bash
        run: |
          make test
