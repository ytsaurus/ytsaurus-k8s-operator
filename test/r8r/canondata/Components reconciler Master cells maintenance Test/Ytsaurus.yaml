      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    volumeClaimTemplates:
    - metadata:
        name: master-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    volumeMounts:
    - mountPath: /yt/master-data
