      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    nodeSelector:
      instance-node-selector: "true"
    podAnnotations:
      instance-pod-annotation: "true"
    podLabels:
      instance-pod-label: "true"
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    runtimeClassName: instance-runtime-class
    setHostnameAsFqdn: true
    timbertruck:
      image: ghcr.io/ytsaurus/sidecars:0.0.1
    tolerations:
    - key: instance-toleration
    volumeClaimTemplates:
    - metadata:
        name: master-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    volumeMounts:
    - mountPath: /yt/master-data
      name: master-data
  queryTrackers:
