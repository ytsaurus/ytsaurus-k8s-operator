      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
  queueAgents:
    instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
  rpcProxies:
  - instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    serviceType: NodePort
    transport: {}
  runtimeClassName: global-runtime-class
  schedulers:
    instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
  secondaryMasters:
  - cellTag: 2
    instanceCount: 1
    locations:
    - locationType: MasterChangelogs
      path: /yt/master-data/master-changelogs
    - locationType: MasterSnapshots
      path: /yt/master-data/master-snapshots
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    volumeClaimTemplates:
    - metadata:
        name: master-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    volumeMounts:
    - mountPath: /yt/master-data
      name: master-data
  setHostnameAsFqdn: false
  strawberry:
    image: ghcr.io/ytsaurus/strawberry:0.0.17
    resources: {}
  tolerations:
  - key: global-toleration
  ui:
    image: ghcr.io/ytsaurus/ui:stable
    resources: {}
    secure: false
    useInsecureCookies: false
  useIpv4: false
  useIpv6: false
  usePorto: false
  useShortNames: true
  yqlAgents:
    image: ghcr.io/ytsaurus/query-tracker:stable-0.1.2
    instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
