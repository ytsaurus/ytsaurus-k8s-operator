apiVersion: cluster.ytsaurus.tech/v1
kind: Ytsaurus
metadata:
  creationTimestamp: null
  generation: 1
  name: test-ytsaurus
  namespace: ytsaurus-components
  resourceVersion: "18"
spec:
  caBundle:
    name: ytsaurus-dev-ca.crt
  caRootBundle:
    items:
    - key: ca-certificates.crt
      path: ca-certificates.crt
    - key: ca-certificates.jks
      path: java/cacerts
    name: ytsaurus-dev-ca-root-bundle
  clusterFeatures:
    enableAnchorProfilingByDefault: true
    enableImageHeater: true
    httpProxyHaveChytAddress: true
    httpProxyHaveHttpsAddress: true
    rpcProxyHavePublicAddress: true
  configOverrides:
    name: test-overrides
  controllerAgents:
    instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
  coreImage: ghcr.io/ytsaurus/ytsaurus:stable-25.2.2
  dataNodes:
  - instanceCount: 3
    locations:
    - locationType: ChunkStore
      path: /yt/node-data/chunk-store
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    volumeClaimTemplates:
    - metadata:
        name: node-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
    volumeMounts:
    - mountPath: /yt/node-data
      name: node-data
  discovery:
    instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
  dnsConfig:
    options:
    - name: global-dns-option
  dnsPolicy: ClusterFirst
  ephemeralCluster: true
  execNodes:
  - instanceCount: 1
    jobEnvironment:
      cri:
        apiRetryTimeoutSeconds: 120
    jobResources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "0"
        memory: "0"
    locations:
    - locationType: ChunkCache
      path: /yt/node-data/chunk-cache
    - locationType: Slots
      path: /yt/node-data/slots
    - locationType: ImageCache
      path: /yt/node-data/image-cache
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    privileged: false
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    volumeClaimTemplates:
    - metadata:
        name: node-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    volumeMounts:
    - mountPath: /yt/node-data
      name: node-data
  extraPodAnnotations:
    extra-pod-annotation: "true"
  hostNetwork: true
  httpProxies:
  - instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
    serviceType: NodePort
    transport:
      httpsSecret:
        name: https-server-cert
  imagePullSecrets:
  - name: global-image-pull-secrets
  jobImage: mirror.gcr.io/library/python:3.12-slim
  masterCaches:
    instanceCount: 1
    loggers:
    - minLogLevel: info
      name: info-stderr
      useTimestampSuffix: false
      writerType: stderr
    minReadyInstanceCount: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "0"
        memory: "0"
  nativeTransport:
    tlsClientSecret:
      name: native-client-cert
    tlsPeerAlternativeHostName: test-ytsaurus
    tlsRequired: true
    tlsSecret:
      name: native-server-cert
  nodeSelector:
    global-node-selector: "true"
  podAnnotations:
    global-pod-annotation: "true"
  podLabels:
    global-pod-label: "true"
  primaryMasters:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: instance-affinity
              operator: Exists
    cellTag: 1
    dnsConfig:
      options:
      - name: instance-dns-option
    dnsPolicy: None
    hostNetwork: false
    hydraPersistenceUploader:
      image: ghcr.io/ytsaurus/sidecars:0.0.1
    instanceCount: 1
    locations:
    - locationType: MasterChangelogs
      path: /yt/master-data/master-changelogs
    - locationType: MasterSnapshots
      path: /yt/master-data/master-snapshots
