{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    {{- include "ytop-chart.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: ytsaurus-k8s-operator
  name: remoteytsaurus.cluster.ytsaurus.tech
spec:
  group: cluster.ytsaurus.tech
  names:
    categories:
    - ytsaurus-all
    - yt-all
    kind: RemoteYtsaurus
    listKind: RemoteYtsaurusList
    plural: remoteytsaurus
    singular: remoteytsaurus
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: RemoteYtsaurus is the Schema for the remoteytsauruses API
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation
              of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this
              object represents.
            type: string
          metadata:
            type: object
          spec:
            description: RemoteYtsaurusSpec defines the desired state of RemoteYtsaurus
            properties:
              cellTag:
                description: 'Deprecated: use primaryMaster.cellTag instead.'
                type: integer
              cellTagMasterCaches:
                description: 'Deprecated: have no effect.'
                type: integer
              hostAddresses:
                description: 'Deprecated: use primaryMaster.hostAddresses instead.'
                items:
                  type: string
                type: array
              hostAddressesMasterCaches:
                description: 'Deprecated: use masterCaches.hostAddresses instead.'
                items:
                  type: string
                type: array
              masterCaches:
                properties:
                  hostAddresses:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                type: object
              primaryMaster:
                properties:
                  cellTag:
                    description: Cell tag is an immutable identifier for particular
                      cell of YTsaurus cluster.
                    maximum: 61440
                    minimum: 1
                    type: integer
                  hostAddresses:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                required:
                - cellTag
                type: object
              secondaryMasters:
                items:
                  properties:
                    cellTag:
                      description: Cell tag is an immutable identifier for particular
                        cell of YTsaurus cluster.
                      maximum: 61440
                      minimum: 1
                      type: integer
                    hostAddresses:
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: set
                  required:
                  - cellTag
                  type: object
                maxItems: 48
                type: array
            type: object
            x-kubernetes-validations:
            - message: either cellTag or primaryMaster.cellTag must be set
              rule: has(self.cellTag) || (has(self.primaryMaster) && has(self.primaryMaster.cellTag))
            - message: cellTag and primaryMaster.cellTag must match when both are
                set
              rule: '!(has(self.cellTag) && has(self.primaryMaster) && has(self.primaryMaster.cellTag))
                || self.cellTag == self.primaryMaster.cellTag'
          status:
            description: RemoteYtsaurusStatus defines the observed state of RemoteYtsaurus
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
